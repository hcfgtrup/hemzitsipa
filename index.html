<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Хёмзиципа</title>
    <link rel="stylesheet" href="css/style.css">

    <!-- ПОДКЛЮЧЕНИЕ СДК ПЛАТФОРМ -->
    <!-- Библиотека для Telegram Web Apps -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Библиотека для VK Mini Apps -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    
    <script>
        function initializeApp() {
            const isVK = window.location.search.includes('vk_app_id');

            if (isVK) {
                console.log('Запущено внутри ВКонтакте. Начинаем интеграцию...');
                if (typeof vkBridge !== 'undefined') {
                    vkBridge.send('VKWebAppInit')
                        .then(() => {
                            console.log('VK Init Success');
                            // Помогаем десктопной версии ВК найти корневой элемент
                            const rootEl = document.getElementById('app') || document.body;
                            if (rootEl) {
                                rootEl.setAttribute('getRootRef', 'true');
                            }
                        })
                        .catch(e => console.error('Ошибка инициализации ВК:', e));
                } else {
                    // Если библиотека ВК не успела прогрузиться, пробуем снова через 100мс
                    setTimeout(initializeApp, 100);
                }
            } else if (window.Telegram && window.Telegram.WebApp) {
                console.log('Запущено внутри Telegram.');
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand(); // Разворачиваем на весь экран
            } else {
                console.log('Запущено в обычном браузере.');
            }
        }

        // Запускаем проверку сразу при готовности DOM дерева
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>

</head>
<!-- Добавили id="root" для совместимости с десктопным ВК -->
<body id="root">
    <div id="app">
        <!-- ГЛАВНОЕ МЕНЮ -->
        <div id="mainMenu" class="game-container main-menu">
            <div class="menu-bg"></div>
            <h1>ХЁМЗИЦИПА</h1>
            <div class="sub">ДЕТЕКТИВНАЯ ИГРА</div>
            
            <div class="menu-buttons">
                <button id="newGameBtn" class="menu-btn">НАЧАТЬ ИГРУ</button>
                <button id="continueBtn" class="menu-btn" style="display: none;">ПРОДОЛЖИТЬ</button>
                <button id="charactersBtn" class="menu-btn">ПЕРСОНАЖИ</button>
                <button id="settingsBtn" class="menu-btn">НАСТРОЙКИ</button>
            </div>
            
            <div class="menu-footer">
                <p>КАЖДЫЙ ВЫБОР МЕНЯЕТ ИСТОРИЮ</p>
            </div>
        </div>
        
        <!-- ПАНЕЛЬ ПЕРСОНАЖЕЙ -->
        <div id="charactersListPanel" class="game-container characters-panel" style="display: none;">
            <div class="panel-header">
                <button id="backToMenuFromChars" class="back-btn">← НАЗАД</button>
                <h2>ПЕРСОНАЖИ</h2>
            </div>
            <div id="charactersList" class="characters-list"></div>
        </div>
        
        <!-- ДЕТАЛЬНАЯ КАРТОЧКА ПЕРСОНАЖА -->
        <div id="characterDetailPanel" class="game-container character-detail-panel" style="display: none;">
            <div class="panel-header">
                <button id="backToMenuFromDetail" class="back-btn">← К СПИСКУ</button>
                <h2>О ПЕРСОНАЖЕ</h2>
            </div>
            <div id="characterDetail" class="character-detail"></div>
        </div>
        
        <!-- ИГРОВОЙ ИНТЕРФЕЙС -->
        <div id="gameInterface" style="display: none;">
            <div class="game-container">
                <!-- ТРИ ТОЧКИ В ПРАВОМ ВЕРХНЕМ УГЛУ -->
                <div class="game-header">
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="dropdown">
                        <button class="dot-menu-btn">⫶</button>
                        <div class="dropdown-content">
                            <button id="menuFromGame">Выход в меню</button>
                            <button id="resetFromGameBtn">Новая игра</button>
                            <button id="toggleMusicBtnDropdown">Музыка</button>
                        </div>
                    </div>
                </div>
                
                <!-- ИМЯ ПЕРСОНАЖА -->
                <div class="player-name">
                    ПЕРСОНАЖ: <span id="playerNameSpan">ДЕТЕКТИВ</span>
                </div>
                
                <!-- СТАТЫ -->
                <div class="stats" id="stats">
                    <div class="stat">ПРОФЕССИОНАЛИЗМ <span id="profValue">0</span></div>
                    <div class="stat">ЛИЧНЫЕ ЧУВСТВА <span id="feelValue">0</span></div>
                    <div class="stat">ДОВЕРИЕ <span id="trustValue">0</span></div>
                </div>
                
                <!-- ТЕКСТ ИСТОРИИ -->
                <div class="story-text" id="storyText">
                    ЗАГРУЗКА...
                </div>
                
                <!-- КНОПКИ ВЫБОРА -->
                <div class="choices" id="choicesList"></div>
            </div>
        </div>
    </div>

    <!-- АУДИОПЛЕЕР -->
    <audio id="bgMusic" loop preload="auto">
        <source src="assets/music/ambient.mp3" type="audio/mpeg">
    </audio>

    <script type="module" src="js/app.js"></script>
    
</body>
</html>
